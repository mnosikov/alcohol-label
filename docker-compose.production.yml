services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-label}
      POSTGRES_USER: ${POSTGRES_USER:-label}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - /opt/label/shared/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-label} -d ${POSTGRES_DB:-label}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - private

  api:
    build: .
    restart: unless-stopped
    command: ["uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - /opt/label/.env
    volumes:
      - /opt/label/shared/uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-dokploy-network}"
      - "traefik.http.routers.label.rule=Host(`${DOMAIN:-label.af5.org}`)"
      - "traefik.http.routers.label.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.label.tls=true"
      - "traefik.http.routers.label.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.label.loadbalancer.server.port=8000"
    networks:
      - private
      - dokploy

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "backend.app.worker"]
    env_file:
      - /opt/label/.env
    volumes:
      - /opt/label/shared/uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - private

networks:
  private:
  dokploy:
    external: true
    name: ${TRAEFIK_NETWORK:-dokploy-network}
