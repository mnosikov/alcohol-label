services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: label
      POSTGRES_USER: label
      POSTGRES_PASSWORD: label
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U label -d label"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    command: ["uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env.example
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build: .
    command: ["python", "-m", "backend.app.worker"]
    env_file: .env.example
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
